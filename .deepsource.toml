version = 1

test_patterns = [
  "**/*.test.ts",
  "**/*.test.tsx",
  "**/*.spec.ts",
  "**/*.spec.tsx",
]

exclude_patterns = [
  "node_modules/**",
  "build/**",
  ".docusaurus/**",
  "static/**",
  "babel.config.js",
]

[[analyzers]]
name = "javascript"
enabled = true

  [analyzers.meta]
  plugins = ["react"]
  environment = ["browser", "node"]
  module_system = "esm"
  dialect = "typescript"

[[analyzers]]
name = "secrets"
enabled = true

[[analyzers]]
name = "test-coverage"
enabled = true

  [analyzers.meta]
  should_analyze_coverage = true
